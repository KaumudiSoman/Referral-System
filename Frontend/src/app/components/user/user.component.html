<!-- Table -->
<div class="w-100">
  <table class="table table-hover table-bordered align-middle mb-0 w-100" style="table-layout: fixed; border-radius: 12px; overflow: hidden;">
    <thead class="table-light text-muted">
      <tr class="table-primary">
        <th style="width: 6%;" class="text-center">#</th>
        <th style="width: 24%;">Name</th>
        <th style="width: 24%;">Email</th>
        <th style="width: 18%;">Phone</th>
        <th style="width: 18%;">City</th>
        <th style="width: 14%;">referredBy</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let item of users; let i = index">
        <td class="text-center text-muted fw-medium">{{ i + 1 }}</td>
        <td class="fw-medium text-truncate">{{ item.name }}</td>
        <td class="fw-medium text-truncate">{{ item.email }}</td>
        <td class="text-truncate">{{ item.phone }}</td>
        <td class="text-truncate">{{ item.city }}</td>
        <td class="text-truncate">{{ item.referredBy }}</td>
      </tr>

      <!-- Empty State -->
      <tr *ngIf="users.length === 0">
        <td colspan="6" class="text-center text-muted py-4">
          <i class="bi bi-inbox fs-4 d-block mb-1"></i>
          No results found
        </td>
      </tr>
    </tbody>
  </table>
</div>
